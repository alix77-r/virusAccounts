<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0f0a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Cairo', sans-serif;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(0, 255, 100, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(0, 255, 100, 0.02) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(0, 255, 100, 0.02) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* ===== INTRO ===== */
        .intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #050a05;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: introFadeOut 5.5s ease-in-out forwards;
        }

        .intro-center {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }

        .hex-bg {
            position: absolute;
            width: 300px;
            height: 300px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            animation: hexIn 0.8s ease-out 0.3s forwards;
        }

        .hex-bg svg {
            width: 100%;
            height: 100%;
            fill: none;
            stroke: rgba(0, 255, 85, 0.1);
            stroke-width: 1;
            animation: hexRotate 20s linear infinite;
        }

        @keyframes hexIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        @keyframes hexRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(0, 255, 85, 0.15);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .ring-1 {
            width: 200px;
            height: 200px;
            animation: ringExpand 2s ease-out 0.5s forwards, ringPulse 3s ease-in-out 2.5s infinite;
            opacity: 0;
        }

        .ring-2 {
            width: 280px;
            height: 280px;
            border-color: rgba(0, 255, 85, 0.08);
            animation: ringExpand 2s ease-out 0.7s forwards, ringPulse 3s ease-in-out 2.7s infinite;
            opacity: 0;
        }

        .ring-3 {
            width: 360px;
            height: 360px;
            border-color: rgba(0, 255, 85, 0.05);
            animation: ringExpand 2s ease-out 0.9s forwards, ringPulse 3s ease-in-out 2.9s infinite;
            opacity: 0;
        }

        @keyframes ringExpand {
            0% { width: 0; height: 0; opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 1; }
        }

        @keyframes ringPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            50% { transform: translate(-50%, -50%) scale(1.05); opacity: 1; }
        }

        .virus-text {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(3.5rem, 10vw, 7rem);
            font-weight: 900;
            color: transparent;
            -webkit-text-stroke: 2px rgba(0, 255, 85, 0.3);
            letter-spacing: 0.4em;
            text-transform: uppercase;
            position: relative;
            opacity: 0;
            animation: textReveal 1.2s ease-out 1s forwards;
        }

        .virus-text::before {
            content: 'VIRUS';
            position: absolute;
            top: 0;
            left: 0;
            width: 0%;
            height: 100%;
            color: #00ff55;
            -webkit-text-stroke: 0;
            overflow: hidden;
            white-space: nowrap;
            animation: textFill 1.5s ease-in-out 1.8s forwards;
            text-shadow: 
                0 0 20px rgba(0, 255, 85, 0.5),
                0 0 60px rgba(0, 255, 85, 0.3),
                0 0 120px rgba(0, 255, 85, 0.1);
        }

        .virus-text::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            width: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #00ff55, transparent);
            transform: translateY(-50%);
            animation: lineExpand 0.8s ease-out 3.5s forwards;
        }

        @keyframes textReveal {
            from { opacity: 0; transform: translateY(30px); letter-spacing: 1em; }
            to { opacity: 1; transform: translateY(0); letter-spacing: 0.4em; }
        }

        @keyframes textFill {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        @keyframes lineExpand {
            0% { width: 0; left: 50%; opacity: 0; }
            50% { opacity: 1; }
            100% { width: 120%; left: -10%; opacity: 1; }
        }

        .loading-bar {
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00ff55, transparent);
            margin-top: 2rem;
            border-radius: 1px;
            opacity: 0;
            animation: loadBar 2s ease-in-out 2.5s forwards;
        }

        @keyframes loadBar {
            0% { width: 0; opacity: 0; }
            20% { opacity: 1; }
            100% { width: 200px; opacity: 1; }
        }

        .intro-particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #00ff55;
            border-radius: 50%;
            opacity: 0;
            box-shadow: 0 0 10px #00ff55;
        }

        .intro-particle:nth-child(1) {
            top: -20px;
            left: 10%;
            animation: particleFloat 2s ease-out 2s forwards;
        }

        .intro-particle:nth-child(2) {
            top: -30px;
            right: 15%;
            animation: particleFloat 2s ease-out 2.3s forwards;
        }

        .intro-particle:nth-child(3) {
            bottom: -20px;
            left: 20%;
            animation: particleFloat 2s ease-out 2.6s forwards;
        }

        .intro-particle:nth-child(4) {
            bottom: -25px;
            right: 10%;
            animation: particleFloat 2s ease-out 2.9s forwards;
        }

        @keyframes particleFloat {
            0% { opacity: 0; transform: translateY(0) scale(0); }
            30% { opacity: 1; transform: translateY(-10px) scale(1); }
            100% { opacity: 0; transform: translateY(-40px) scale(0); }
        }

        .flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0, 255, 85, 0.15) 0%, transparent 70%);
            opacity: 0;
            animation: flashIn 0.5s ease-out 4.5s forwards;
        }

        @keyframes flashIn {
            0% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 1; }
            100% { opacity: 0; transform: scale(2); }
        }

        @keyframes introFadeOut {
            0% { opacity: 1; visibility: visible; }
            85% { opacity: 1; visibility: visible; }
            100% { opacity: 0; visibility: hidden; }
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            opacity: 0;
            animation: mainReveal 1s ease-out 5s forwards;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            padding: 2rem;
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 600px;
        }

        @keyframes mainReveal {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .server-image-container {
            position: relative;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            padding: 4px;
            background: linear-gradient(135deg, #00ff55, #00aa33, #00ff55);
            animation: rotateBorder 4s linear infinite;
        }

        @keyframes rotateBorder {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        .server-image {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #0a0f0a;
            background: #0a0f0a;
        }

        .server-image-container::after {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border-radius: 50%;
            border: 1px solid rgba(0, 255, 85, 0.2);
            animation: pulseRing 2s ease-out infinite;
        }

        @keyframes pulseRing {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.2); opacity: 0; }
        }

        .server-name {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 900;
            color: #00ff55;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            text-shadow: 
                0 0 20px rgba(0, 255, 85, 0.4),
                0 0 60px rgba(0, 255, 85, 0.2);
            position: relative;
        }

        .server-name::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #00ff55, transparent);
            border-radius: 2px;
        }

        .social-box {
            position: relative;
            padding: 2rem 3rem;
            border-radius: 16px;
            background: rgba(10, 20, 10, 0.8);
            border: 1px solid rgba(0, 255, 85, 0.15);
            overflow: hidden;
            margin-top: 1rem;
        }

        .social-box::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #00ff55, transparent, #00ff55, transparent, #00ff55);
            background-size: 400% 400%;
            border-radius: 17px;
            z-index: -1;
            animation: borderGlow 3s ease infinite;
            opacity: 0.6;
        }

        @keyframes borderGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .social-title {
            color: #88ffaa;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            text-align: center;
            letter-spacing: 0.1em;
        }

        .buttons-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
            min-width: 280px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            padding: 1rem 2rem;
            border-radius: 12px;
            text-decoration: none;
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        .btn-youtube {
            background: linear-gradient(135deg, #ff0000, #cc0000);
            box-shadow: 0 4px 20px rgba(255, 0, 0, 0.3);
        }

        .btn-youtube:hover {
            box-shadow: 0 8px 30px rgba(255, 0, 0, 0.5);
        }

        .btn-tiktok {
            background: linear-gradient(135deg, #1a1a1a, #000000);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-tiktok:hover {
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.7);
            border-color: rgba(255,255,255,0.2);
        }

        .btn-website {
            background: linear-gradient(135deg, #0066ff, #0044cc);
            box-shadow: 0 4px 20px rgba(0, 102, 255, 0.3);
        }

        .btn-website:hover {
            box-shadow: 0 8px 30px rgba(0, 102, 255, 0.5);
        }

        .icon {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .footer {
            margin-top: 2rem;
            color: #446644;
            font-size: 0.85rem;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 0.15em;
            text-align: center;
        }

        .footer span {
            color: #00ff55;
            text-shadow: 0 0 10px rgba(0, 255, 85, 0.3);
        }

        .particle {
            position: fixed;
            width: 2px;
            height: 2px;
            background: rgba(0, 255, 85, 0.3);
            border-radius: 50%;
            pointer-events: none;
            animation: floatParticle linear infinite;
        }

        @keyframes floatParticle {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        @media (max-width: 480px) {
            .social-box {
                padding: 1.5rem 1.5rem;
                margin: 0 1rem;
            }
            .buttons-container {
                min-width: unset;
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <!-- Intro Animation -->
    <div class="intro-overlay">
        <div class="flash"></div>
        
        <div class="hex-bg">
            <svg viewBox="0 0 100 100">
                <polygon points="50,5 95,27.5 95,72.5 50,95 5,72.5 5,27.5"/>
            </svg>
        </div>

        <div class="ring ring-1"></div>
        <div class="ring ring-2"></div>
        <div class="ring ring-3"></div>

        <div class="intro-center">
            <div class="virus-text">
                VIRUS
                <div class="intro-particle"></div>
                <div class="intro-particle"></div>
                <div class="intro-particle"></div>
                <div class="intro-particle"></div>
            </div>
            <div class="loading-bar"></div>
        </div>
    </div>

    <!-- Floating Particles -->
    <script>
        for(let i = 0; i < 20; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDuration = (Math.random() * 10 + 10) + 's';
            p.style.animationDelay = Math.random() * 10 + 's';
            p.style.width = (Math.random() * 3 + 1) + 'px';
            p.style.height = p.style.width;
            document.body.appendChild(p);
        }
    </script>

    <!-- Main Content -->
    <div class="main-content">
        
        <!-- Server Image - GitHub Raw Link (Fixed) -->
        <div class="server-image-container">
            <img src="https://raw.githubusercontent.com/alix77-r/hdhdhdh/main/file_0000000041b871f4b988bc07e4825813.png" alt="Virus Server" class="server-image">
        </div>

        <!-- Server Name -->
        <h1 class="server-name">VIRUS</h1>

        <!-- Social Box -->
        <div class="social-box">
            <div class="social-title">حساباتنا</div>
            <div class="buttons-container">
                
                <a href="https://youtube.com/channel/UCrXQB5MuWBO3_5pM3WHdtBA?si=R5EfchKEelKIu9Jk" target="_blank" class="btn btn-youtube">

                    قناة اليوتيوب
                </a>

                <a href="https://www.tiktok.com/@virushub_?_r=1&_t=ZS-94OGIJcI7Kn" target="_blank" class="btn btn-tiktok">

                <a href="https://alix77-r.github.io/virusweb/" target="_blank" class="btn btn-website">

                    موقعنا
                </a>

            </div>
        </div>

        <div class="footer">
            Developed by <span>alimohmed</span> / <span>krov</span>
        </div>

    </div>

</body>
</html>
